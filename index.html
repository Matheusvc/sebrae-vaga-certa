<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SEBRAE Vaga Certa — Estacionamento inteligente para eventos</title>
    <meta
      name="description"
      content="SEBRAE Vaga Certa: plataforma inteligente de estacionamento para eventos, com ocupação em tempo real, reserva com QR e rede de parceiros."
    />
    <meta name="theme-color" content="#0A0D14" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
:root {
  --bg: #0a0d14;
  --surface: #111722;
  --elevated: #161e2b;
  --line: #212b3a;
  --text: #eaeff7;
  --muted: #8c97a9;
  --faint: #5a6577;
  --mint: #36e2a6;
  --cyan: #22c3e6;
  --amber: #f5b544;
  --coral: #ff5c73;
  --violet: #8b7cf6;
  --flow: linear-gradient(110deg, #22c3e6, #36e2a6);
  --shadow: none;
  --cardhover: 0 0 0 1px var(--line);
  --ring: #22c3e6;
  --disp: "Sora", sans-serif;
  --body: "Inter", system-ui, sans-serif;
  --mono: "JetBrains Mono", monospace;
}
[data-theme="light"] {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --elevated: #f0f3f8;
  --line: #e5e9f0;
  --text: #0e1726;
  --muted: #5b6676;
  --faint: #98a2b3;
  --shadow: 0 1px 3px rgba(16, 24, 40, 0.06);
  --cardhover: 0 12px 32px -12px rgba(16, 24, 40, 0.18);
}
* {
  box-sizing: border-box;
}
html,
body {
  margin: 0;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  min-height: 100vh;
  transition:
    background-color 0.3s,
    color 0.2s;
}
h1,
h2,
h3 {
  font-family: var(--disp);
  margin: 0;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.eyebrow {
  color: var(--cyan);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 700;
  font-family: var(--body);
}
.mono {
  font-family: var(--mono);
}
.muted {
  color: var(--muted);
}
.faint {
  color: var(--faint);
}
a {
  color: inherit;
  text-decoration: none;
}
.wrap {
  max-width: 1140px;
  margin: 0 auto;
  padding: 0 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: var(--shadow);
  transition:
    background 0.3s,
    border-color 0.3s,
    box-shadow 0.25s,
    transform 0.25s;
}
.lift:hover {
  transform: translateY(-3px);
  box-shadow: var(--cardhover);
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 999px;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 999px;
}
button {
  font-family: inherit;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  color: #06231c;
  background: var(--flow);
  transition:
    filter 0.2s,
    transform 0.1s;
}
.btn:hover {
  filter: brightness(1.06);
}
.btn:active {
  transform: scale(0.98);
}
.btn:disabled {
  color: var(--faint);
  background: var(--elevated);
  cursor: not-allowed;
  filter: none;
}
.btn.sm {
  padding: 9px 14px;
  font-size: 13px;
}
.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: 12px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text);
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
  transition:
    background 0.2s,
    border-color 0.2s;
}
.ghost:hover {
  background: var(--elevated);
}
.ghost.sm {
  padding: 8px 13px;
  font-size: 13px;
}
.link {
  background: none;
  border: none;
  color: var(--cyan);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  padding: 0;
}
.iconbtn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 11px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: background 0.2s;
}
.iconbtn:hover {
  background: var(--elevated);
}
input,
select,
textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 11px;
  border: 1px solid var(--line);
  background: var(--elevated);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus,
select:focus,
textarea:focus {
  border-color: var(--ring);
}
label.f {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
}
.field {
  margin-bottom: 14px;
}
.grid {
  display: grid;
  gap: 16px;
}
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.view {
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
@media (prefers-reduced-motion: reduce) {
  .view,
  * {
    animation: none !important;
    transition: none !important;
  }
}
/* header */
.head {
  position: sticky;
  top: 0;
  z-index: 40;
  backdrop-filter: blur(12px);
  background: color-mix(in srgb, var(--bg) 82%, transparent);
  border-bottom: 1px solid var(--line);
  transition:
    background 0.3s,
    border-color 0.3s;
}
.head .inner {
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  cursor: pointer;
}
.brand .name {
  font-family: var(--disp);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.03em;
}
.brand .name b {
  color: var(--mint);
}
.brand .sub {
  color: var(--faint);
  font-size: 9px;
  letter-spacing: 1.5px;
}
.nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav a {
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: 0.2s;
}
.nav a:hover {
  color: var(--text);
  background: var(--elevated);
}
.nav a.on {
  color: var(--text);
}
.nav a.on::after {
  content: "";
  display: block;
  height: 2px;
  border-radius: 2px;
  background: var(--flow);
  margin-top: 5px;
}
.hactions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--flow);
  color: #06231c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  cursor: pointer;
}
@media (max-width: 820px) {
  .nav {
    display: none;
  }
  .brand .sub {
    display: none;
  }
}
/* hero */
.hero {
  position: relative;
  overflow: hidden;
  border-radius: 26px;
  margin-top: 24px;
  border: 1px solid var(--line);
  background: var(--surface);
}
.hero .mesh {
  position: absolute;
  inset: 0;
  background: radial-gradient(800px 360px at 12% -10%, #22c3e633, transparent),
    radial-gradient(700px 420px at 100% 0%, #36e2a622, transparent);
}
.hero .in {
  position: relative;
  padding: 64px 40px;
}
.hero h1 {
  font-size: clamp(30px, 5vw, 52px);
  font-weight: 800;
  max-width: 720px;
}
.hero p {
  color: var(--muted);
  font-size: 17px;
  max-width: 560px;
  margin: 18px 0 28px;
}
.statband {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 34px;
}
.statband .s {
  padding: 18px;
}
.statband .v {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 700;
}
@media (max-width: 720px) {
  .hero .in {
    padding: 40px 22px;
  }
  .statband {
    grid-template-columns: repeat(2, 1fr);
  }
}
/* sections */
.sec {
  margin-top: 56px;
}
.sechead {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 16px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.sechead h2 {
  font-size: clamp(22px, 3vw, 30px);
  font-weight: 700;
}
.feat {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 16px;
}
.feat .c {
  padding: 22px;
}
.feat .ico {
  width: 46px;
  height: 46px;
  border-radius: 13px;
  background: var(--elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
}
/* events grid */
.evgrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
}
.evcard {
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}
.evcard .img {
  height: 170px;
  background-size: cover;
  background-position: center;
  position: relative;
}
.evcard .img .tag {
  position: absolute;
  top: 12px;
  left: 12px;
}
.evcard .bd {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}
.bar {
  height: 7px;
  border-radius: 999px;
  background: var(--elevated);
  overflow: hidden;
}
.bar > i {
  display: block;
  height: 100%;
  border-radius: 999px;
  transition: width 0.6s;
}
.meta {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--muted);
  font-size: 13px;
}
/* kpis */
.kpis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 14px;
}
.kpi {
  padding: 18px;
}
.kpi .v {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 700;
  margin-top: 4px;
}
#bigmap,
#minimap {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: var(--elevated);
}
#bigmap {
  height: 340px;
}
#minimap {
  height: 220px;
}
.leaflet-container {
  background: var(--elevated);
}
/* account */
.acct {
  display: grid;
  grid-template-columns: 250px 1fr;
  gap: 22px;
  margin-top: 26px;
  align-items: start;
}
.acctmenu {
  padding: 10px;
  position: sticky;
  top: 84px;
}
.acctmenu button {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 11px 13px;
  border-radius: 11px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: 0.2s;
}
.acctmenu button:hover {
  background: var(--elevated);
  color: var(--text);
}
.acctmenu button.on {
  background: var(--elevated);
  color: var(--text);
}
.acctmenu button.on svg {
  color: var(--mint);
}
.acctmenu .sep {
  height: 1px;
  background: var(--line);
  margin: 8px 6px;
}
@media (max-width: 820px) {
  .acct {
    grid-template-columns: 1fr;
  }
  .acctmenu {
    position: static;
    display: flex;
    gap: 6px;
    overflow-x: auto;
  }
  .acctmenu .sep {
    display: none;
  }
  .acctmenu button {
    white-space: nowrap;
  }
}
/* admin */
.shell {
  display: flex;
  min-height: calc(100vh - 0px);
}
.side {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.side .navi {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 12px;
  border-radius: 10px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
}
.side .navi.on {
  color: var(--text);
  background: var(--elevated);
}
.side .navi.on svg {
  color: var(--mint);
}
.charts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}
.pgrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}
.pcard {
  background: var(--elevated);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 11px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  color: var(--muted);
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--line);
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
}
.spotgrid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
}
@media (max-width: 600px) {
  .spotgrid {
    grid-template-columns: repeat(5, 1fr);
  }
}
.spot {
  aspect-ratio: 1;
  border-radius: 9px;
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: var(--elevated);
  transition: 0.15s;
}
.spot.taken {
  opacity: 0.4;
  cursor: not-allowed;
}
.spot.sel {
  background: var(--mint);
  color: #06231c;
  border-color: var(--mint);
}
/* toggle switch */
.switch {
  position: relative;
  width: 46px;
  height: 26px;
  border-radius: 999px;
  background: var(--elevated);
  border: 1px solid var(--line);
  cursor: pointer;
  flex-shrink: 0;
  transition: 0.2s;
}
.switch.on {
  background: var(--flow);
  border-color: transparent;
}
.switch i {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  transition: 0.2s;
}
.switch.on i {
  transform: translateX(20px);
}
/* modal */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 60;
  background: rgba(5, 8, 14, 0.6);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeUp 0.25s ease;
}
.modal {
  width: 100%;
  max-width: 420px;
  padding: 28px;
}
/* toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 80;
  background: var(--text);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  animation: fadeUp 0.25s ease;
}
.footer {
  margin-top: 70px;
  border-top: 1px solid var(--line);
  padding: 32px 0 40px;
  color: var(--muted);
  font-size: 13px;
}
.kv {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 3px 0;
}
.notif {
  display: flex;
  gap: 12px;
  padding: 14px;
  border-radius: 14px;
  background: var(--elevated);
}
.mobnav {
  display: none;
}
@media (max-width: 820px) {
  .mobnav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 0;
  }
  .mobnav a {
    padding: 8px 13px;
    border-radius: 9px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
  }
  .mobnav a.on {
    color: #06231c;
    background: var(--flow);
    border-color: transparent;
  }
}
/* localização banner */
.locbar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: #2747d8;
  color: #fff;
  padding: 10px 44px;
  font-size: 14px;
  font-weight: 500;
  flex-wrap: wrap;
  position: relative;
}
.locbar .cta {
  background: #eef173;
  color: #13227a;
  border: none;
  border-radius: 9px;
  padding: 8px 16px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.locbar .cta:hover {
  filter: brightness(1.03);
}
.locbar .x {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  opacity: 0.85;
}
/* search + subnav */
.search {
  flex: 1;
  max-width: 540px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--elevated);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 4px 5px 4px 14px;
}
.search input {
  border: none;
  background: none;
  padding: 9px 0;
  flex: 1;
}
.search input:focus {
  border: none;
}
.sbtn {
  border: none;
  background: var(--surface);
  border-radius: 9px;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
}
.sbtn:hover {
  color: var(--cyan);
}
.locitem {
  display: flex;
  align-items: center;
  gap: 7px;
  background: none;
  border: none;
  color: var(--muted);
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  padding: 8px 10px;
  border-radius: 10px;
}
.locitem:hover {
  background: var(--elevated);
  color: var(--text);
}
.iconbtn.on {
  background: var(--flow);
  color: #06231c;
  border-color: transparent;
}
.head .inner {
  height: auto;
  padding: 12px 0 6px;
}
.subnavnav {
  overflow-x: auto;
  padding-bottom: 8px;
}
@media (max-width: 900px) {
  .search {
    max-width: none;
    order: 3;
    flex-basis: 100%;
  }
  .head .inner {
    flex-wrap: wrap;
  }
}
@media (max-width: 820px) {
  .subnavnav {
    display: flex;
  }
}
@media (max-width: 1080px) {
  .hidesm {
    display: none;
  }
}
/* alto contraste */
[data-contrast="on"] {
  --muted: var(--text);
  --faint: var(--text);
}
[data-contrast="on"] .card,
[data-contrast="on"] input,
[data-contrast="on"] .ghost,
[data-contrast="on"] .iconbtn {
  border-width: 2px;
}
[data-contrast="on"] a,
[data-contrast="on"] .link {
  text-decoration: underline;
}
[data-contrast="on"][data-theme="dark"] {
  --bg: #000;
  --surface: #0b0b0b;
  --elevated: #161616;
  --line: #ffffff;
  --text: #ffffff;
}
[data-contrast="on"][data-theme="light"] {
  --bg: #fff;
  --surface: #fff;
  --elevated: #fff;
  --line: #000;
  --text: #000;
}
/* SEBRAE Bot */
.fab {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 55;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 16px 10px 10px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: var(--flow);
  color: #06231c;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 14px 34px -10px rgba(0, 0, 0, 0.55);
}
.fab:hover {
  filter: brightness(1.05);
}
.fab .av {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #0e1420;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab .nd {
  position: absolute;
  top: 4px;
  right: 8px;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--coral);
  border: 2px solid var(--surface);
}
.chatpanel {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 56;
  width: 374px;
  max-width: calc(100vw - 32px);
  height: 560px;
  max-height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
  border-radius: 20px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--line);
  box-shadow: 0 26px 64px -18px rgba(0, 0, 0, 0.6);
  animation: fadeUp 0.25s ease;
}
.chathead {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
}
.chatbody {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  background: var(--bg);
}
.bub {
  max-width: 84%;
  padding: 10px 13px;
  border-radius: 15px;
  font-size: 14px;
  line-height: 1.5;
}
.bub.bot {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--line);
  border-bottom-left-radius: 5px;
}
.bub.me {
  align-self: flex-end;
  background: var(--flow);
  color: #06231c;
  border-bottom-right-radius: 5px;
  font-weight: 500;
}
.bub .chip {
  margin-top: 8px;
  display: inline-flex;
}
.chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 0 14px 10px;
}
.chip {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.chip:hover {
  background: var(--elevated);
}
.chatin {
  display: flex;
  gap: 8px;
  padding: 12px 14px;
  border-top: 1px solid var(--line);
}
.typing {
  display: inline-flex;
  gap: 4px;
  padding: 2px 0;
}
.typing i {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--faint);
  animation: blink 1s infinite;
}
.typing i:nth-child(2) {
  animation-delay: 0.2s;
}
.typing i:nth-child(3) {
  animation-delay: 0.4s;
}
@keyframes blink {
  0%,
  60%,
  100% {
    opacity: 0.25;
  }
  30% {
    opacity: 1;
  }
}
@media (max-width: 480px) {
  .chatpanel {
    right: 0;
    bottom: 0;
    width: 100vw;
    height: 100dvh;
    max-height: 100dvh;
    border-radius: 0;
  }
}

/* ============================================================
   RESPONSIVIDADE GLOBAL (ajustes finais)
   ============================================================ */

/* tablets: colunas fixas 2-col viram 1-col */
@media (max-width: 860px) {
  [style*="grid-template-columns:1"] { grid-template-columns: 1fr !important; }
  .charts { grid-template-columns: 1fr; }
}

/* admin: esconde sidebar, conteúdo full width (mobnav assume) */
@media (max-width: 820px) {
  .shell { display: block; }
  .side { display: none; }
  .shell .wrap { padding: 18px 16px !important; }
}

/* celulares */
@media (max-width: 560px) {
  .wrap { padding-left: 16px; padding-right: 16px; }
  #bigmap { height: 300px; }
  #minimap { height: 240px; }
  .evgrid { grid-template-columns: 1fr; }
  .pgrid { grid-template-columns: repeat(2, 1fr); }
  .statband { grid-template-columns: repeat(2, 1fr); }
  .hero h1 { font-size: 30px; line-height: 1.12; }
  .hero p { font-size: 15px; }
  .sechead h2, h2 { font-size: 21px; }
  .locbar { padding: 10px 38px; font-size: 13px; gap: 10px; }
  .locbar .cta { padding: 7px 12px; }
  .fab { right: 14px; bottom: 14px; }
  .head .inner { gap: 10px; }
  .reservebar, .stickycta { left: 12px; right: 12px; }
}

/* celulares estreitos */
@media (max-width: 380px) {
  .pgrid, .statband { grid-template-columns: 1fr 1fr; }
  .spotgrid { grid-template-columns: repeat(4, 1fr); }
  .kpis { grid-template-columns: 1fr 1fr; }
  .search { padding-left: 10px; }
}

/* mapa: garante que o controle de camadas não estoure */
.leaflet-top.leaflet-right { z-index: 5; }
.leaflet-control-layers, .leaflet-bar { box-shadow: 0 4px 14px rgba(0,0,0,.25); }

function escapeHtml(s) {

function haversine(a, b, c, d) {
  const R = 6371,
    r = (x) => (x * Math.PI) / 180;
  const dy = r(c - a),
    dx = r(d - b);
  const h = Math.sin(dy / 2) ** 2 + Math.cos(r(a)) * Math.cos(r(c)) * Math.sin(dx / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function gauge(r, size = 176) {
  r = Math.max(0, Math.min(1, r));
  const st = statusOf(r),
    R = size / 2 - 16,
    cx = size / 2,
    cy = size / 2;
  const pt = (a) => [cx + R * Math.cos(a), cy - R * Math.sin(a)];
  const [sx, sy] = pt(Math.PI),
    [ex, ey] = pt(Math.PI * (1 - r)),
    [fx, fy] = pt(0);
  return `<svg width="${size}" height="${size / 2 + 26}" viewBox="0 0 ${size} ${size / 2 + 26}"><defs><linearGradient id="gg" x1="0" x2="1"><stop offset="0" stop-color="${ACC.cyan}"/><stop offset="1" stop-color="${st.hex}"/></linearGradient></defs>
   <path d="M ${sx} ${sy} A ${R} ${R} 0 0 1 ${fx} ${fy}" fill="none" stroke="${TH.line}" stroke-width="14" stroke-linecap="round"/>
   ${r > 0.004 ? `<path d="M ${sx} ${sy} A ${R} ${R} 0 0 1 ${ex} ${ey}" fill="none" stroke="url(#gg)" stroke-width="14" stroke-linecap="round"/>` : ""}
   <text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="34" font-weight="700" fill="${TH.text}" font-family="JetBrains Mono">${Math.round(r * 100)}%</text>
   <text x="${cx}" y="${cy + 15}" text-anchor="middle" font-size="11" fill="${TH.muted}" letter-spacing="1.5">OCUPAÇÃO</text></svg>`;
}
function barChart() {
  const W = 520,
    H = 180,
    pad = 26,
    max = 210,
    bw = 40,
    gap = (W - pad * 2 - bw * PEAK.length) / (PEAK.length - 1);
  let b = "",
    l = "";
  PEAK.forEach(([h, f], i) => {
    const x = pad + i * (bw + gap),
      bh = (f / max) * (H - 50),
      y = H - 30 - bh;
    b += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="${ACC.cyan}"/>`;
    l += `<text x="${x + bw / 2}" y="${H - 12}" text-anchor="middle" font-size="11" fill="${TH.faint}">${h}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${b}${l}</svg>`;
}
function areaChart(r) {
  const pts = [
    ["16", 0.18],
    ["17", 0.34],
    ["18", 0.55],
    ["19", 0.74],
    ["20", r],
    ["21", Math.max(0.4, r - 0.18)],
    ["22", 0.32],
  ];
  const W = 520,
    H = 180,
    pad = 26,
    pw = W - pad * 2,
    ph = H - 50,
    X = (i) => pad + i * (pw / (pts.length - 1)),
    Y = (v) => H - 30 - v * ph;
  let d = "M " + X(0) + " " + Y(pts[0][1]);
  pts.forEach((p, i) => {
    if (i) d += " L " + X(i).toFixed(1) + " " + Y(p[1]).toFixed(1);
  });
  const ar = d + ` L ${X(pts.length - 1)} ${H - 30} L ${X(0)} ${H - 30} Z`;
  const l = pts
    .map((p, i) => `<text x="${X(i)}" y="${H - 12}" text-anchor="middle" font-size="10" fill="${TH.faint}">${p[0]}h</text>`)
    .join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}"><defs><linearGradient id="ar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${ACC.mint}" stop-opacity=".4"/><stop offset="1" stop-color="${ACC.mint}" stop-opacity="0"/></linearGradient></defs>
   <path d="${ar}" fill="url(#ar)"/><path d="${d}" fill="none" stroke="${ACC.mint}" stroke-width="2.6" stroke-linejoin="round"/>${l}</svg>`;
}

const PRIORIDADES = ["Não preciso", "Gestante", "Pessoa com deficiência (PcD)", "Idoso(a) 60+", "Mobilidade reduzida"];
function isReleased(e) { return !e.releaseAt || new Date(e.releaseAt).getTime() <= Date.now(); }
function releaseCountdown(e) {
  let ms = new Date(e.releaseAt).getTime() - Date.now();
  if (ms <= 0) return "liberada";
  const d = Math.floor(ms / 864e5); ms -= d * 864e5;
  const h = Math.floor(ms / 36e5); ms -= h * 36e5;
  const m = Math.floor(ms / 6e4); ms -= m * 6e4;
  const sec = Math.floor(ms / 1e3);
  if (d > 0) return d + "d " + h + "h " + m + "min";
  if (h > 0) return h + "h " + m + "min";
  return m + "min " + sec + "s";
}
function vehLabel(k) { const v = VEHICLES.find((x) => x.key === k); return v ? v.label : "Carro"; }
function waMessage(r) {
  const e = EVENTS.find((x) => x.id === r.eventId) || {};

    "*Evento:* " + (r.eventName || e.name || "") + "\n" +

    "Apresente o QR/codigo na guarita para liberar o acesso. Chegue ate " + TOLERANCIA_MIN + " min apos o horario para nao perder a vaga.");
}
function waLink(r) { return "https://wa.me/?text=" + encodeURIComponent(waMessage(r)); }

Emitido em:    ${new Date(r.createdAt || Date.now()).toLocaleString("pt-BR")}
==========================================
Apresente este código/QR na cancela para check-in automático.
Realização: SEBRAE Maranhão · Complexo Multicenter Negócios e Eventos`;
}
function downloadText(filename, text) {
  try {
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  } catch (e) {
    toast("Não foi possível baixar");
  }
}

function initMap(sel, pts, h) {

    });
    const sat = L.layerGroup([
      L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        maxZoom: 19,
        attribution: "Imagery © Esri",
      }),
      L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png", { maxZoom: 20, opacity: 0.9 }),
    ]);
    ruas.addTo(mapInst);

    pts.forEach((p) =>
      L.circleMarker([p[0], p[1]], { radius: 11, color: "#fff", fillColor: p[2] || ACC.cyan, fillOpacity: 1, weight: 3 })
        .addTo(mapInst)

    );
    PARTNERS.forEach((p) =>

        .addTo(mapInst)

    );
    NOPARK.forEach((z) =>

        .addTo(mapInst)

    );
    if (S.geo) drawRoute(mapInst, S.geo, { lat: pts[0][0], lng: pts[0][1] });
    if (!window._pfResize) {
      window._pfResize = true;

    }
    setTimeout(() => mapInst && mapInst.invalidateSize(), 160);
  } catch (e) {}
}
function drawRoute(map, from, to) {
  L.circleMarker([from.lat, from.lng], { radius: 9, color: "#fff", fillColor: ACC.amber, fillOpacity: 1, weight: 3 })
    .addTo(map)
    .bindTooltip("Você está aqui", { direction: "top" });
  const setInfo = (html) => {
    const el = $("#route-info");
    if (el) el.innerHTML = html;
  };
  setInfo(`${ic("clock", "var(--muted)", 15)} calculando trajeto até o SEBRAE…`);
  fetch(`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`)
    .then((r) => r.json())
    .then((d) => {
      const rt = d && d.routes && d.routes[0];
      if (!rt) throw 0;
      const coords = rt.geometry.coordinates.map((c) => [c[1], c[0]]);
      L.polyline(coords, { color: "#0A0D14", weight: 9, opacity: 0.25 }).addTo(map);
      L.polyline(coords, { color: ACC.mint, weight: 6, opacity: 0.95 }).addTo(map);
      map.fitBounds(L.latLngBounds(coords).pad(0.18));
      const km = (rt.distance / 1000).toFixed(1),
        min = Math.max(1, Math.round(rt.duration / 60));
      setInfo(`${ic("nav", ACC.mint, 16)} <b>${km} km</b> · ~${min} min de carro até o SEBRAE`);
    })
    .catch(() => {
      L.polyline(
        [
          [from.lat, from.lng],
          [to.lat, to.lng],
        ],
        { color: ACC.mint, weight: 4, dashArray: "8 8", opacity: 0.85 },
      ).addTo(map);
      map.fitBounds(
        L.latLngBounds([
          [from.lat, from.lng],
          [to.lat, to.lng],
        ]).pad(0.25),
      );
      const km = haversine(from.lat, from.lng, to.lat, to.lng).toFixed(1);
      setInfo(`${ic("nav", ACC.mint, 16)} ~<b>${km} km</b> até o SEBRAE (linha reta — rota detalhada indisponível)`);
    });
}

function botUserSend(text) {
  text = (text || "").trim();
  if (!text) return;
  BOT.msgs.push({ who: "me", text: escapeHtml(text) });
  BOT.msgs.push({ who: "bot", temp: true, text: '<span class="typing"><i></i><i></i><i></i></span>' });
  renderBot();
  const reply = botReply(text);
  setTimeout(() => {
    BOT.msgs = BOT.msgs.filter((m) => !m.temp);
    BOT.msgs.push({ who: "bot", text: reply });
    renderBot();
  }, 560);
}
function botReply(t) {

    return `Olá! 👋 Sou o <b>SEBRAE Bot</b>, assistente do ${e.name}. Posso ajudar com <b>reservas</b>, <b>vagas em tempo real</b>, <b>localização</b> e <b>parceiros</b>. O que você precisa?`;
  if (has("vaga", "disponiv", "lota", "ocupa", "cheio", "livre", "tem lugar"))
    return `Agora há <b>${free} vagas livres</b> (${Math.round(r * 100)}% ocupado) no Centro de Convenções. ${r >= 0.85 ? "⚠️ Está enchendo — já vale usar um estacionamento parceiro." : "Boa hora pra chegar! 🚗"}`;
  if (has("reserv"))
    return `Reservar é rápido: <b>Eventos → escolha o evento → Reservar vaga →</b> data, horário e vaga. Você recebe um <b>QR Code</b> para check-in automático na cancela.<br><button class="chip" data-act="botGo" data-r="eventos">Ir para Eventos</button>`;
  if (has("onde", "local", "endereco", "fica", "chegar", "mapa", "rota", "como vou"))
    return `O evento é no <b>Complexo Multicenter</b> (Centro de Convenções Pedro Neiva de Santana), Av. Jerônimo de Albuquerque — Cohafuma, São Luís/MA, ao lado da Assembleia Legislativa.<br><button class="chip" data-act="botGo" data-r="evento">Ver mapa do local</button> <button class="chip" data-act="ativarLoc">Usar minha localização</button>`;
  if (has("parceir", "alternativ", "perto", "proximo", "lotou", "lotado"))
    return `Se o principal lotar, indicamos os mais próximos:<br>• <b>Estac. ALEMA</b> — 270 m (4 min)<br>• <b>Galileu Center</b> — 280 m (5 min)<br>• <b>Igreja Cohafuma</b> — 450 m (7 min)`;
  if (has("horario", "quando", "data", "dia ", "abre", "fecha", "que horas"))
    return `O <b>${e.name}</b> acontece em <b>${fmtDate(e.date)}</b>, das <b>${e.time} às ${e.end}</b>.`;
  if (has("qr", "check", "cancela", "entrada", "codigo"))
    return `No dia, é só aproximar o <b>QR Code</b> da sua reserva na cancela — o <b>check-in é automático</b>, sem fila. 🎫`;
  if (has("ia", "camera", "yolo", "funciona", "inteligen", "monitora", "tecnolog"))
    return `Usamos as <b>câmeras já existentes</b> com IA (<b>YOLOv11 + OpenCV</b>) pra contar entradas e saídas e estimar as vagas em tempo real — sem instalar sensores novos. 🤖`;
  if (has("preco", "valor", "tarifa", "pagar", "custa", "quanto", "paga"))
    return `Tarifa estimada: <b>R$ 30,00</b> (2h) + <b>R$ 5,00</b> de reserva. O pagamento no app é simulado nesta demonstração.`;
  if (has("pcd", "defici", "acessib", "idoso", "cadeira", "preferencial"))
    return `Sim! Há vagas <b>preferenciais e PcD</b> próximas às entradas. Você pode priorizá-las em <b>Minha Conta → Preferências</b>.`;
  if (has("sebrae", "organiza", "contato", "telefone", "email", "falar", "humano", "atendente", "suporte"))
    return `O evento é uma realização do <b>SEBRAE Maranhão</b>.<br>📞 ${ORG.phone}<br>✉️ ${ORG.mail}`;
  if (has("obrigad", "valeu", "vlw", "brigad", "thanks")) return `Disponha! 💚 Qualquer coisa, é só chamar o SEBRAE Bot.`;
  return `Não tenho certeza se entendi 😅. Posso ajudar com: <b>reservar</b>, <b>vagas agora</b>, <b>onde fica</b>, <b>parceiros</b>, <b>horários</b> e <b>como funciona a IA</b>. Tenta uma dessas?`;
}

/* ===================== live + init ===================== */
setInterval(() => {
  const e0 = EVENTS[0];
  if (Math.random() < 0.5) pushMove("in"); else pushMove("out");
  e0.occupied = Math.max(Math.round(e0.total * 0.2), Math.min(Math.round(e0.total * 0.99), insideNow()));
  EVENTS.slice(1).forEach((e) => {
    const d = Math.random() < 0.6 ? 1 : -1;
    e.occupied = Math.max(Math.round(e.total * 0.2), Math.min(Math.round(e.total * 0.99), e.occupied + d * (1 + Math.floor(Math.random() * 3))));
  });
  updateLive();
}, 1600);
setInterval(() => { const c = fmtClock(Date.now()); $$("[data-clock]").forEach((el) => (el.textContent = c)); }, 1000);
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" || !e.target) return;
  if (e.target.id === "searchin") {
    e.preventDefault();
    doSearch();
  } else if (e.target.id === "botin") {
    e.preventDefault();
    botUserSend(e.target.value);
  }
});
if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
if (S.user && (S.user.role === "admin" || S.user.role === "gestor")) S.route = "admin";
else if (S.user && S.user.role === "guarita") S.route = "guarita";
applyTheme();
render();
renderBot();

</script>

</html>
